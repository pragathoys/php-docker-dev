services:
  web:
    build: ./php
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_NAME: dev_db
      DB_USER: dev_user
      DB_PASSWORD: dev_password
    networks:
      - app-network

  db:
    image: mariadb:10.11
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: dev_db
      MYSQL_USER: dev_user
      MYSQL_PASSWORD: dev_password
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app-network    

  adminer:
    image: adminer
    restart: always
    ports:
      - "8081:8080"
    networks:
      - app-network      
   
networks:
  app-network:
    driver: bridge    
    
volumes:
  db_data: